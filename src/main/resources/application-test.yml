spring:
  datasource:
    url: jdbc:h2:mem:bandviz_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

bandviz:
  jira:
    sync-enabled: false
  bandwidth:
    overload-threshold: 85
    busy-threshold: 70
    default-weekly-capacity-hours: 40
